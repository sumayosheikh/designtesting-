<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

button {
  padding:15px 30px;
  margin-top:20px;
  background:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="text">A supplier is failing.</h1>
  <button onclick="next()">What do you do?</button>
</div>

<script>
let steps = [
  "You detect a delay.",
  "Costs start rising.",
  "Inventory runs low.",
  "You switch suppliers.",
  "You prevent a stockout."
];

let i = 0;

function next() {
  document.getElementById("text").innerText = steps[i];
  i = (i + 1) % steps.length;
}
</script>

</body>
</html>
